name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_REGION: europe-west1
  AR_REPO: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/backlog-scoring
  IMAGE_NAME: api
  CLOUD_RUN_SERVICE: backlog-scoring-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Generate image tag
        run: |
          TAG="$(date -u +%Y%m%d-%H%M)-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:$TAG" >> "$GITHUB_OUTPUT"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ needs.build-and-push.outputs.full_image }} \
            --region=${{ env.GCP_REGION }} \
            --update-env-vars="IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }},GIT_SHA=${{ github.sha }}"
